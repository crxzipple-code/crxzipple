name: crxzipple-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CRXZIPPLE_POSTGRES_DB:-crxzipple}
      POSTGRES_USER: ${CRXZIPPLE_POSTGRES_USER:-crxzipple}
      POSTGRES_PASSWORD: ${CRXZIPPLE_POSTGRES_PASSWORD:-crxzipple}
    ports:
      - "127.0.0.1:${CRXZIPPLE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${CRXZIPPLE_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
