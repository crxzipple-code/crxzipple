kind: local_package
namespace: context_tree
prompt:
  title: Context Tree Controls
  summary: "Operate the prompt tree itself: list, expand, collapse, pin, estimate, and mirror selected schemas. Inspect relevant capability, session, skill, memory, artifact, and workspace handles before declaring context or tools unavailable. Do not expand many historical tool_interaction nodes as a substitute for the next owner-tool action."
capabilities:
  - context_workspace.read
  - context_workspace.write
  - context_workspace.render
dependencies:
  - id: context_tree_service
    kind: service_dependency
    description: Context Workspace tree application service used to list and mutate prompt tree nodes.
    required: false
  - id: context_render_service
    kind: service_dependency
    description: Context Workspace render service used to estimate visible prompt payloads and provider mirrors.
    required: false
local_tools:
  - id: context_tree.list
    name: Context Tree List
    description: List the current prompt context tree nodes, their state, supported actions, and estimates.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_list
    tool_kind: function
    parameters:
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.list
  - id: context_tree.expand
    name: Context Tree Expand
    description: Expand one relevant context tree node and load owner-provided children when available. Use for a specific missing fact or capability handle; avoid expanding multiple historical tool_interaction nodes instead of taking the next useful owner-tool action.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_expand
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to expand.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.expand
  - id: context_tree.collapse
    name: Context Tree Collapse
    description: Collapse a context tree node while keeping it available as a handle.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_collapse
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to collapse.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.collapse
  - id: context_tree.pin
    name: Context Tree Pin
    description: Pin a context tree node so it remains prominent in future context renders.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_pin
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to pin.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.pin
  - id: context_tree.unpin
    name: Context Tree Unpin
    description: Unpin a context tree node.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_unpin
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to unpin.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.unpin
  - id: context_tree.estimate
    name: Context Tree Estimate
    description: Estimate the current visible context tree prompt payload and provider mirrors.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_estimate
    tool_kind: function
    parameters:
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.estimate
  - id: context_tree.update_plan
    name: Context Tree Update Plan
    description: Update the visible public working plan node only when the task phase, objective, verified facts, blocker, or next-step strategy materially changes. Do not use this as a per-tool-call progress log or private reasoning scratchpad. Repeating phase_update/phase_change inside the same phase is treated as no-op; use verified_fact, blocker, recovery, or final_summary to record meaningful state inside the same phase.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_update_plan
    tool_kind: function
    parameters:
      - name: objective
        data_type: string
        description: Public objective currently being advanced.
        required: true
      - name: status
        data_type: string
        description: Plan status such as in_progress, verifying, blocked, or done.
        required: false
      - name: current_step
        data_type: string
        description: Current public execution phase or milestone, not every minor action.
        required: false
      - name: completed_steps
        data_type: array
        description: Public list of completed steps.
        required: false
      - name: verified_facts
        data_type: array
        description: Public list of verified facts or evidence.
        required: false
      - name: assumptions
        data_type: array
        description: Public assumptions still needing validation.
        required: false
      - name: blockers
        data_type: array
        description: Public blockers or unresolved limitations.
        required: false
      - name: next_steps
        data_type: array
        description: Public next steps.
        required: false
      - name: update_reason
        data_type: string
        description: Why the public plan needs an update, such as phase_change, verified_fact, blocker, objective_change, recovery, or final_summary. Repeating the same plan is treated as no-op; repeating phase_change/phase_update for the same objective/status/current_step is also no-op.
        required: false
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - planning
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.update_plan
  - id: context_tree.enable_tool_schema
    name: Context Tree Enable Tool Schema
    description: Mirror an expanded tool node as a provider tool schema on the next prompt render.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_enable_tool_schema
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Tool function context node id to mirror as a provider schema.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.enable_tool_schema
  - id: context_tree.disable_tool_schema
    name: Context Tree Disable Tool Schema
    description: Stop mirroring an expanded tool node as a provider tool schema on the next prompt render.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_disable_tool_schema
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Tool function context node id to stop mirroring as a provider schema.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.disable_tool_schema
