kind: local_package
namespace: context_tree
runtime_request:
  title: Capability Discovery
  summary: "Search and enable runtime capabilities without exposing the internal context control plane. Use capability.search to find available tool groups, provider-callable functions, and resource handles before declaring a capability unavailable."
  default_tool_schema_policy:
    priority: 5
  default_tool_schema_group_refs:
    - source_id: bundled.local_package.context_tree
      group_key: capability_discovery
  groups:
    capability_discovery:
      order: 10
      title: Capability Discovery
      summary: Search available runtime capabilities and optionally enable matching provider-callable tool functions. Prefer this over inspecting the internal context state directly.
      function_ids:
        - capability.search
      default_tool_schema_ids:
        - capability.search
      default_tool_schema_max_count: 1
      default_tool_schema_source: bundled.local_package.context_tree.runtime_request_group.capability_discovery
    surface_read:
      order: 90
      title: Internal Context Surface Read
      summary: Internal/debug controls for reading the current context control state. Do not expose by default to the model.
      function_ids:
        - context_tree.list
        - context_tree.estimate
        - context_tree.render_current
        - context_tree.read_snapshot
        - context_tree.diff_since
capabilities:
  - context_workspace.read
  - context_workspace.write
  - context_workspace.render
dependencies:
  - id: context_tree_service
    kind: service_dependency
    description: Context Workspace tree application service used to list and mutate prompt tree nodes.
    required: false
  - id: context_observation_snapshot_service
    kind: service_dependency
    description: Context Workspace observation snapshot service used for debug rendering, snapshot reads, and tree diffs.
    required: false
local_tools:
  - id: capability.search
    name: Capability Search
    description: Search available runtime capabilities, tool groups, and provider-callable functions. Set enable=true to enable clearly matching tool functions for the next model step. Use this before declaring a tool or capability unavailable.
    provider_name: local_system
    entrypoint: tools.context_tree.local:capability_search
    tool_kind: function
    parameters:
      - name: query
        data_type: string
        description: Capability, tool, source, or action to search for, such as weather, browser network, workspace read, image generation, or shell.
        required: false
      - name: enable
        data_type: boolean
        description: When true, enable clearly matching provider-callable tool functions for the next model step.
        required: false
      - name: limit
        data_type: integer
        description: Maximum number of matching capability records to return. Defaults to 12.
        required: false
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - capability
      - tool-discovery
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: capability.search
  - id: context_tree.list
    name: Context Tree List
    description: List the current prompt context tree nodes, their state, supported actions, and estimates.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_list
    tool_kind: function
    parameters:
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.list
  - id: context_tree.expand
    name: Context Tree Expand
    description: Expand one relevant context tree node and load owner-provided children when available. Use for a specific missing fact or capability handle; avoid expanding multiple historical tool_interaction nodes instead of taking the next useful owner-tool action.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_expand
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to expand.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.expand
  - id: context_tree.collapse
    name: Context Tree Collapse
    description: Collapse a context tree node while keeping it available as a handle.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_collapse
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to collapse.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.collapse
  - id: context_tree.pin
    name: Context Tree Pin
    description: Pin a context tree node so it remains prominent in future context renders.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_pin
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to pin.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.pin
  - id: context_tree.unpin
    name: Context Tree Unpin
    description: Unpin a context tree node.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_unpin
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Context node id to unpin.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.unpin
  - id: context_tree.estimate
    name: Context Tree Estimate
    description: Estimate the current visible context tree prompt payload and provider mirrors.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_estimate
    tool_kind: function
    parameters:
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.estimate
  - id: context_tree.render_current
    name: Context Tree Render Current
    description: Render the current visible Context Tree debug body. Use when provider-native continuation needs to re-check current tree state instead of relying on stale memory.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_render_current
    tool_kind: function
    parameters:
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
      - name: max_chars
        data_type: integer
        description: Maximum characters of Context Tree debug body to return in the tool text. Defaults to 16000.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.render_current
  - id: context_tree.read_snapshot
    name: Context Tree Read Snapshot
    description: Read a recorded Context Tree snapshot by id, including the rendered debug body and included node handles.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_read_snapshot
    tool_kind: function
    parameters:
      - name: snapshot_id
        data_type: string
        description: Context snapshot id.
        required: true
      - name: max_chars
        data_type: integer
        description: Maximum characters of Context Tree debug body to return in the tool text. Defaults to 16000.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: context_tree.read_snapshot
  - id: context_tree.diff_since
    name: Context Tree Diff Since
    description: Compare the current Context Tree render against a previous snapshot or tree revision. Use to decide whether current tree state must be re-read.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_diff_since
    tool_kind: function
    parameters:
      - name: snapshot_id
        data_type: string
        description: Optional snapshot id used as the baseline.
        required: false
      - name: revision
        data_type: integer
        description: Optional baseline tree revision when no snapshot id is available.
        required: false
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.diff_since
  - id: context_tree.update_plan
    name: Context Tree Update Plan
    description: Update the visible public working plan node only when the task phase, objective, observed facts, uncertainty, blocker, or next-step strategy materially changes. Do not use this as a per-tool-call progress log or private reasoning scratchpad. Repeating phase_update/phase_change inside the same phase is treated as no-op; use observed_fact, uncertainty, blocker, recovery, or final_summary to record meaningful state inside the same phase.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_update_plan
    tool_kind: function
    parameters:
      - name: objective
        data_type: string
        description: Public objective currently being advanced.
        required: true
      - name: status
        data_type: string
        description: Plan status such as in_progress, verifying, blocked, or done.
        required: false
      - name: current_step
        data_type: string
        description: Current public execution phase or milestone, not every minor action.
        required: false
      - name: completed_steps
        data_type: array
        description: Public list of completed steps.
        required: false
      - name: observed_facts
        data_type: array
        description: Public list of observed facts or evidence.
        required: false
      - name: assumptions
        data_type: array
        description: Public assumptions still needing validation.
        required: false
      - name: blockers
        data_type: array
        description: Public blockers or unresolved limitations.
        required: false
      - name: next_steps
        data_type: array
        description: Public next steps.
        required: false
      - name: update_reason
        data_type: string
        description: Why the public plan needs an update, such as phase_change, observed_fact, uncertainty, blocker, objective_change, recovery, or final_summary. Repeating the same plan is treated as no-op; repeating phase_change/phase_update for the same objective/status/current_step is also no-op.
        required: false
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - planning
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.update_plan
  - id: context_tree.enable_tool_schema
    name: Context Tree Enable Tool Schema
    description: Mirror an expanded tool node as a provider tool schema on the next prompt render.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_enable_tool_schema
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Tool function context node id to mirror as a provider schema.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.enable_tool_schema
  - id: context_tree.disable_tool_schema
    name: Context Tree Disable Tool Schema
    description: Stop mirroring an expanded tool node as a provider tool schema on the next prompt render.
    provider_name: local_system
    entrypoint: tools.context_tree.local:context_tree_disable_tool_schema
    tool_kind: function
    parameters:
      - name: node_id
        data_type: string
        description: Tool function context node id to stop mirroring as a provider schema.
        required: true
      - name: session_key
        data_type: string
        description: Optional session key. Defaults to the current session in tool context.
        required: false
    tags:
      - context_tree
      - builtin
      - system-managed
      - scope:session_context
      - surface:interactive
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    context_requirements:
      - session_key
    runtime_key: context_tree.disable_tool_schema
