- id: browser.script.extract_request
  name: Browser Script Extract Request
  description: Extract structured endpoint, HTTP method, frontend client, and payload-key candidates from a bounded live script
    window. Use after browser.code.search or browser.script.find_request returns a script_id plus line/column, then verify
    the candidate with browser.evaluate or network capture instead of repeating broad bundle searches.
  provider_name: crxzipple.browser
  entrypoint: tools.browser.local:create_browser_manifest_handler
  tool_kind: function
  parameters:
  - name: profile
    data_type: string
    description: Browser profile to use. Omit this for normal browser work; the runtime/session/agent/browser default profile
      is used automatically. Only pass a concrete configured profile name when the user explicitly asks for one; 'default'
      is not a profile name.
    required: false
    json_schema:
      type: string
      description: Browser profile to use. Omit this for normal browser work; the runtime/session/agent/browser default profile
        is used automatically. Only pass a concrete configured profile name when the user explicitly asks for one; 'default'
        is not a profile name.
  - name: profile_pool
    data_type: string
    description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
    required: false
    json_schema:
      type: string
      description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
  - name: target_id
    data_type: string
    description: Optional live browser tab identifier.
    required: false
    json_schema:
      type: string
      description: Optional live browser tab identifier.
  - name: script_id
    data_type: string
    description: DevTools script id to inspect.
    required: false
    json_schema:
      type: string
      description: DevTools script id to inspect.
  - name: url_contains
    data_type: string
    description: Fallback script URL substring selector when script id is unknown.
    required: false
    json_schema:
      type: string
      description: Fallback script URL substring selector when script id is unknown.
  - name: query
    data_type: string
    description: Optional frontend function, endpoint, or request keyword to mark as focus.
    required: false
    json_schema:
      type: string
      description: Optional frontend function, endpoint, or request keyword to mark as focus.
  - name: endpoint
    data_type: string
    description: Optional endpoint literal to mark as focus.
    required: false
    json_schema:
      type: string
      description: Optional endpoint literal to mark as focus.
  - name: request_url
    data_type: string
    description: Optional observed request URL to mark as focus.
    required: false
    json_schema:
      type: string
      description: Optional observed request URL to mark as focus.
  - name: path
    data_type: string
    description: Optional endpoint path to mark as focus.
    required: false
    json_schema:
      type: string
      description: Optional endpoint path to mark as focus.
  - name: start_line
    data_type: integer
    description: One-based first source line for the extraction window.
    required: false
    json_schema:
      type: integer
      minimum: 1
      description: One-based first source line for the extraction window.
  - name: line_count
    data_type: integer
    description: Maximum source lines to scan. Keep small and prefer column windows for minified bundles.
    required: false
    json_schema:
      type: integer
      minimum: 1
      maximum: 40
      default: 8
      description: Maximum source lines to scan. Keep small and prefer column windows for minified bundles.
  - name: column
    data_type: integer
    description: One-based match column from code.search; extraction is centered near it.
