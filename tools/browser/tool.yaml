kind: local_package
namespace: browser
local_tools:
  - id: browser_profile
    name: Browser Profile
    description: Inspect available browser profiles and lightweight runtime diagnostics. Use `kind=list` or omit `kind` to enumerate profiles, the current default profile, capability summaries, and guidance. Use `kind=diagnose` with `profile` to actively probe one profile and return actionable diagnostics plus fallback guidance.
    provider_name: local_system
    entrypoint: tools.browser.local:browser_profile
    tool_kind: function
    parameters:
      - name: kind
        data_type: string
        description: Optional profile operation. Use `list` to enumerate profiles or `diagnose` to probe one profile. Defaults to `list`.
        required: false
      - name: profile
        data_type: string
        description: Browser profile name to inspect when `kind=diagnose`.
        required: false
    tags:
      - browser
      - builtin
      - system-managed
      - surface:interactive
    required_effect_ids:
      - local_tool_access
    mutates_state: false
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: browser_profile

  - id: browser_control
    name: Browser Control
    description: Manage browser profile lifecycle and tabs. Use `status` to inspect one profile's current runtime state, `start` to attach or lazily launch it without navigating anywhere, and `stop` to close the managed runtime without wiping profile data. Use `open-tab`, `list-tabs`, `navigate`, `focus-tab`, `close-tab`, and `reset` for tab and profile operations. `open-tab` usually comes first and returns the live `target_id` for that tab. Reuse that `target_id` immediately when you truly need to address a different tab, but avoid inventing or reusing stale historical tab ids. This tool builds one `BrowserControlRequest` and sends it through the browser facade's single dispatch path.
    provider_name: local_system
    entrypoint: tools.browser.local:browser_control
    tool_kind: function
    parameters:
      - name: kind
        data_type: string
        description: Control kind. Must be one of `status`, `start`, `stop`, `open-tab`, `list-tabs`, `navigate`, `focus-tab`, `close-tab`, or `reset`.
        required: true
      - name: profile
        data_type: string
        description: Optional browser profile name. Omit to use the current default profile.
        required: false
      - name: target_id
        data_type: string
        description: Browser tab identifier. Required for `navigate`, `focus-tab`, and `close-tab`. Use a live id returned by `open-tab` or `list-tabs`; do not invent synthetic ids.
        required: false
      - name: url
        data_type: string
        description: Convenience URL for `open-tab` and `navigate`. It is copied into `payload.url`.
        required: false
      - name: payload
        data_type: object
        description: Optional JSON object payload for advanced control arguments. Most calls should just use `url`.
        required: false
      - name: timeout_ms
        data_type: integer
        description: Optional timeout in milliseconds.
        required: false
    tags:
      - browser
      - builtin
      - system-managed
      - surface:interactive
    required_effect_ids:
      - local_tool_access
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: browser_control

  - id: browser_snapshot
    name: Browser Snapshot
    description: Inspect the current tab and produce structured browser snapshot output. Prefer `format=interactive` when you want `ref` values for later actions. `interactive` is the single ref-producing snapshot surface and supports `mode=efficient`, `mode=focused`, and `mode=wide` to trade off compactness against breadth. On Playwright-backed profiles it is snapshot-first and only falls back when snapshot extraction is unavailable. You can also request `format=role` for a role tree with refs or `format=aria` for the raw aria snapshot text. Use `selector` to scope the snapshot to a subtree and `frame_selector` to scope it to an iframe/frame subtree. When you are continuing on the same tab, prefer omitting `target_id` so the tool reuses the profile's current active tab; only pass `target_id` when you intentionally need a different live tab. This tool builds one `BrowserPageActionRequest` and sends it through the same browser facade dispatch path used by all page actions.
    provider_name: local_system
    entrypoint: tools.browser.local:browser_snapshot
    tool_kind: function
    parameters:
      - name: profile
        data_type: string
        description: Optional browser profile name. Omit to use the current default profile.
        required: false
      - name: target_id
        data_type: string
        description: Optional live browser tab identifier to snapshot. Prefer omitting it when you want the current active tab for the profile, and only set it when you intentionally need a different tab returned by `open-tab` or `list-tabs`.
        required: false
      - name: selector
        data_type: string
        description: Optional CSS selector root for the snapshot. When provided, `interactive`, `role`, and `aria` snapshots are scoped to that subtree instead of the whole page.
        required: false
      - name: format
        data_type: string
        description: Snapshot format. Supported values are `interactive`, `role`, `aria`, `html`, `text`, `title`, and `url`. Use `interactive` for ref-producing action-oriented snapshots with strategy modes, `role` for a readable role tree with refs, or `aria` for the raw aria snapshot text.
        required: false
      - name: refs_mode
        data_type: string
        description: Optional explicit ref view selector. Use `role` or `aria` as a clearer alternative to setting `format` directly for those two snapshot types. When provided together with `format`, it must agree with `format`.
        required: false
      - name: mode
        data_type: string
        description: Optional snapshot mode for `interactive`. It defaults to `efficient`, which turns on a more compact action-oriented view and defaults `depth` to `6` unless you override it. Use `focused` for a tighter visible/enabled subset or `wide` for the broader ref sweep.
        required: false
      - name: compact
        data_type: boolean
        description: Optional compact flag for `interactive` snapshots. When true, the role-tree view suppresses more unnamed click-oriented noise.
        required: false
      - name: depth
        data_type: integer
        description: Optional maximum role-tree depth for `interactive` snapshots. `mode=efficient` defaults this to `6`.
        required: false
      - name: frame_selector
        data_type: string
        description: Optional iframe/frame CSS selector. When provided, snapshots are scoped to that frame subtree instead of the full page, while returned refs still keep their absolute `frame_path`.
        required: false
      - name: overlay_source_ref
        data_type: string
        description: Optional trigger/input ref whose previously opened overlay should be preferred when `active_overlay=true`.
        required: false
      - name: overlay_source_selector
        data_type: string
        description: Optional trigger/input selector whose previously opened overlay should be preferred when `active_overlay=true`.
        required: false
      - name: active_overlay
        data_type: boolean
        description: Optional overlay-only flag. When true and no explicit selector root is given, the snapshot first tries to scope itself to the currently active dropdown, popup, dialog, or autocomplete surface.
        required: false
      - name: limit
        data_type: integer
        description: Optional item limit for `interactive` snapshots. If omitted, `mode=efficient` uses a smaller default cap to keep refs manageable while `mode=focused` uses a larger one. Ignored by `html`, `text`, `title`, and `url`.
        required: false
      - name: timeout_ms
        data_type: integer
        description: Optional timeout in milliseconds.
        required: false
      - name: payload
        data_type: object
        description: Optional JSON object payload for advanced snapshot arguments.
        required: false
    tags:
      - browser
      - builtin
      - system-managed
      - surface:interactive
    required_effect_ids:
      - local_tool_access
    mutates_state: false
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: browser_snapshot

  - id: browser_action
    name: Browser Action
    description: Run one browser page action. Use `kind=click`, `console`, `cookies`, `dialog`, `fill`, `upload`, `download`, `wait-download`, `wait`, or `storage` for common atomic steps, or advanced kinds such as `type`, `press`, `hover`, `drag`, `resize`, `scroll-into-view`, `select`, `screenshot`, `pdf`, `evaluate`, or `batch`. Defaults to pure single-step behavior; when you explicitly set `stabilize` or `observe_after`, this same tool can add one internal wait and/or one trailing post-state snapshot. Prefer `browser_control` for tab lifecycle and `browser_snapshot` for observation.
    provider_name: local_system
    entrypoint: tools.browser.local:browser_action
    tool_kind: function
    parameters:
      - name: kind
        data_type: string
        description: Page-action kind. Use `click`, `console`, `cookies`, `dialog`, `fill`, `upload`, `download`, `wait-download`, `wait`, `batch`, `type`, `press`, `hover`, `drag`, `resize`, `scroll-into-view`, `select`, `screenshot`, `pdf`, `evaluate`, or `storage`.
        required: true
      - name: profile
        data_type: string
        description: Optional browser profile name. Omit to use the current default profile.
        required: false
      - name: target_id
        data_type: string
        description: Browser tab identifier.
        required: false
      - name: ref
        data_type: string
        description: Preferred element ref returned by `browser_snapshot`.
        required: false
      - name: selector
        data_type: string
        description: CSS selector fallback when no `ref` is available.
        required: false
      - name: scope_ref
        data_type: string
        description: Optional parent/container ref that narrows selector or text resolution before resolving the target.
        required: false
      - name: scope_selector
        data_type: string
        description: Optional parent/container selector that narrows selector or text resolution before resolving the target.
        required: false
      - name: exact
        data_type: boolean
        description: Optional exact-match flag for text-based waits or selector-text disambiguation.
        required: false
      - name: ordinal
        data_type: integer
        description: Optional zero-based candidate index for repeated matches.
        required: false
      - name: overlay_source_ref
        data_type: string
        description: Optional trigger/input ref whose previously opened overlay should be preferred for overlay-aware waits or snapshots.
        required: false
      - name: overlay_source_selector
        data_type: string
        description: Optional trigger/input selector whose previously opened overlay should be preferred for overlay-aware waits or snapshots.
        required: false
      - name: button
        data_type: string
        description: Mouse button for `click` or `download`, such as `left`, `middle`, or `right`.
        required: false
      - name: double_click
        data_type: boolean
        description: Double-click flag for `click` or `download`.
        required: false
      - name: text
        data_type: string
        description: Text payload for `fill`, `type`, or `wait(text=...)`.
        required: false
      - name: fields
        data_type: array
        description: Multi-field form fill payload for `fill`. Each item should be an object like `{\"ref\":\"r1\",\"type\":\"text\",\"value\":\"昆明\"}` or `{\"ref\":\"r2\",\"type\":\"checkbox\",\"value\":true}`.
        required: false
      - name: paths
        data_type: array
        description: File paths for `upload`. Use together with `ref` or `selector` that resolves to a file input element. Each item should be a readable local filesystem path.
        required: false
      - name: delay_ms
        data_type: integer
        description: Optional typing delay for `type`, or a fixed delay for `wait` when used as `delay_ms`.
        required: false
      - name: time_ms
        data_type: integer
        description: OpenClaw-style alias for `wait` fixed delay. Equivalent to `delay_ms`.
        required: false
      - name: key
        data_type: string
        description: Key payload for `press`, for example `Enter`, `ArrowDown`, or `Escape`.
        required: false
      - name: accept
        data_type: boolean
        description: Dialog handling flag for `dialog`. Defaults to true and accepts the next JavaScript dialog; set false to dismiss it.
        required: false
      - name: prompt_text
        data_type: string
        description: Optional prompt response text for `dialog` when accepting a prompt dialog.
        required: false
      - name: level
        data_type: string
        description: Optional console level filter for `console`, such as `error`, `warn`, `info`, `log`, or `debug`.
        required: false
      - name: cookies_operation
        data_type: string
        description: Cookie operation for `cookies`. Use `get`, `set`, or `clear`.
        required: false
      - name: cookie
        data_type: object
        description: Cookie payload for `cookies set`, such as `{\"name\":\"session\",\"value\":\"abc\",\"url\":\"https://example.com\"}`. You may also use `domain` plus `path`, and optional `secure`, `httpOnly`, `sameSite`, or `expires`.
        required: false
      - name: clear
        data_type: boolean
        description: Optional `console` flag. When true, clears the captured console buffer after reading it.
        required: false
      - name: limit
        data_type: integer
        description: Optional maximum number of most-recent console messages to return for `console`, or maximum number of storage entries to render back in tool content.
        required: false
      - name: storage_kind
        data_type: string
        description: Storage namespace for `storage`. Use `local` or `session`.
        required: false
      - name: storage_operation
        data_type: string
        description: Storage operation for `storage`. Use `get`, `set`, or `clear`.
        required: false
      - name: storage_key
        data_type: string
        description: Optional storage key for `storage get`, or required key for `storage set`.
        required: false
      - name: storage_value
        data_type: string
        description: Storage value for `storage set`.
        required: false
      - name: clear_existing
        data_type: boolean
        description: Optional replacement-style input flag for `type`.
        required: false
      - name: state
        data_type: string
        description: Selector wait state for `wait`, such as `visible`, `attached`, or `hidden`.
        required: false
      - name: text_gone
        data_type: string
        description: Text content to wait until it disappears for `wait`.
        required: false
      - name: url
        data_type: string
        description: URL or glob pattern for `wait(url=...)`.
        required: false
      - name: load_state
        data_type: string
        description: Document load state for `wait`, such as `load`, `domcontentloaded`, or `networkidle`.
        required: false
      - name: start_ref
        data_type: string
        description: Source element ref for `drag`. Preferred over selector targeting.
        required: false
      - name: start_selector
        data_type: string
        description: Source element selector for `drag` when no ref is available.
        required: false
      - name: end_ref
        data_type: string
        description: Target element ref for `drag`. Preferred over selector targeting.
        required: false
      - name: end_selector
        data_type: string
        description: Target element selector for `drag` when no ref is available.
        required: false
      - name: actions
        data_type: array
        description: Action list for `batch`. Each action object should use the same browser act fields such as `kind`, `ref`, `selector`, `text`, `width`, `height`, `fn`, and `timeout_ms`.
        required: false
      - name: stop_on_error
        data_type: boolean
        description: Optional `batch` flag. Defaults to true and stops on the first failed child action.
        required: false
      - name: width
        data_type: integer
        description: Viewport width for `resize`.
        required: false
      - name: height
        data_type: integer
        description: Viewport height for `resize`.
        required: false
      - name: target_ref
        data_type: string
        description: Legacy alias for `end_ref` on `drag`.
        required: false
      - name: target_selector
        data_type: string
        description: Legacy alias for `end_selector` on `drag`.
        required: false
      - name: value
        data_type: string
        description: Single value for `select`.
        required: false
      - name: values
        data_type: array
        description: Multi-value selection payload for `select`.
        required: false
      - name: type
        data_type: string
        description: Output type for `screenshot`, for example `png` or `jpeg`.
        required: false
      - name: full_page
        data_type: boolean
        description: Full-page capture flag for `screenshot`.
        required: false
      - name: print_background
        data_type: boolean
        description: Print background flag for `pdf`.
        required: false
      - name: expression
        data_type: string
        description: JavaScript expression for `evaluate`.
        required: false
      - name: fn
        data_type: string
        description: OpenClaw-style alias for `evaluate`. Prefer `fn` when mirroring that contract; it is mapped to the same underlying page function field.
        required: false
      - name: arg
        data_type: object
        description: Optional single argument passed to `evaluate`.
        required: false
      - name: payload
        data_type: object
        description: Optional JSON object payload for page-action arguments. Prefer the top-level fields when possible.
        required: false
      - name: timeout_ms
        data_type: integer
        description: Optional timeout in milliseconds.
        required: false
      - name: stabilize
        data_type: string
        description: Optional single-step stabilization policy. Supported values are `auto`, `navigation`, `micro`, `overlay`, and `none`.
        required: false
      - name: stabilize_timeout_ms
        data_type: integer
        description: Optional timeout in milliseconds for the internal stabilization wait.
        required: false
      - name: observe_after
        data_type: string
        description: Optional post-step observation policy. Supported values are `auto`, `interactive`, `role`, `aria`, and `none`.
        required: false
      - name: observe_payload
        data_type: object
        description: 'Optional snapshot payload used by `observe_after`, for example `{ "format": "interactive", "mode": "focused" }`.'
        required: false
    tags:
      - browser
      - builtin
      - system-managed
      - surface:interactive
    required_effect_ids:
      - local_tool_access
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: browser_action

  - id: browser_script
    name: Browser Script
    description: Execute a short browser script made of ordered control and page-action steps in one tool call. Prefer this tool whenever the browser task naturally needs two or more sequential steps, for example `open-tab` then `wait`, `click` then `wait`, or `fill` then `press Enter` then `wait`. This reduces extra observe cycles because the script can return one combined result instead of forcing the model to call another browser tool after every step. Each step reuses the same browser arguments you would pass to `browser_control`, `browser_snapshot`, or `browser_action`. If an early step resolves a `target_id` such as `open-tab`, later steps can inherit that tab automatically, so later steps usually should not repeat `target_id`. Steps can also request internal stabilization and post-step observation, so the tool can return one updated page-state tree without a separate follow-up snapshot call. When `final_observe` is provided, the tool runs one trailing `snapshot` on the current tab after the script finishes and returns that post-state in `content`. For a single-step `open-tab` or `navigate` script, prefer one final observe instead of combining it with step-level observation. When in doubt, use step-level or script-level `observe_after=interactive` so the script appends one focused interactive snapshot automatically.
    provider_name: local_system
    entrypoint: tools.browser.local:browser_script
    tool_kind: function
    parameters:
      - name: steps
        data_type: array
        description: Ordered browser script steps. Each step must be an object, not a JSON string. Use an array like `[{\"kind\":\"open-tab\",\"family\":\"control\",\"url\":\"https://example.com\"},{\"kind\":\"wait\",\"load_state\":\"domcontentloaded\"}]`. Each step can include `kind`, optional `family` (`control` or `page-action`), and the same browser fields you would normally pass to `browser_control`, `browser_snapshot`, or `browser_action`. Steps can also set `stabilize`, `stabilize_timeout_ms`, `observe_after`, and `observe_payload` to control internal wait plus post-step observation.
        required: true
      - name: target_id
        data_type: string
        description: Optional initial live browser tab identifier. If omitted, later steps can inherit `target_id` from an earlier step such as `open-tab`. Prefer inheritance over repeating or inventing tab ids.
        required: false
      - name: stop_on_error
        data_type: boolean
        description: Whether to stop at the first failed step. Defaults to true.
        required: false
      - name: default_stabilize
        data_type: string
        description: Optional script-wide default stabilization policy for steps that do not set `stabilize`. Supported values are `auto`, `navigation`, `micro`, `overlay`, and `none`.
        required: false
      - name: default_stabilize_timeout_ms
        data_type: integer
        description: Optional script-wide timeout for stabilization waits.
        required: false
      - name: default_observe_after
        data_type: string
        description: Optional script-wide default post-step observation policy for steps that do not set `observe_after`. Supported values are `auto`, `interactive`, `role`, `aria`, and `none`.
        required: false
      - name: default_observe_payload
        data_type: object
        description: Optional script-wide default snapshot payload for step-level `observe_after`, for example an interactive focused snapshot payload.
        required: false
      - name: final_observe
        data_type: object
        description: Optional trailing snapshot payload. When provided, the script runs a final `snapshot` against the current tab after all steps succeed. A typical choice is an interactive focused snapshot so the model receives one post-action page-state tree with refs.
        required: false
      - name: observe_after
        data_type: boolean
        description: Convenience flag for `final_observe`. When true and `final_observe` is omitted, the script appends an `interactive` focused snapshot automatically. Prefer this for short action chains when you want the next model step to continue from the updated page state. For a single-step `open-tab` or `navigate` script, use this instead of adding another default step observation.
        required: false
    tags:
      - browser
      - builtin
      - system-managed
      - surface:interactive
      - surface:macro
    required_effect_ids:
      - local_tool_access
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: browser_script
