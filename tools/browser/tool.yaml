  - name: target_id
    data_type: string
    description: Optional live browser tab identifier.
    required: false
    json_schema:
      type: string
      description: Optional live browser tab identifier.
  - name: actions
    data_type: array
    description: Ordered browser actions. Each item uses kind plus optional selector/ref/text/url/expression/payload/timeout_ms.
      Supported kinds include fill, type, click, press, wait, evaluate, screenshot, snapshot, and nested batch. Use selector/ref
      for mutating targets; Playwright selectors such as text=Visible Label are allowed when appropriate.
