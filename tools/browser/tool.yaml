  - name: target_id
    data_type: string
    description: Optional live browser tab identifier.
    required: false
    json_schema:
      type: string
      description: Optional live browser tab identifier.
  - name: selector
    data_type: string
    description: Optional CSS selector root for form inspection.
    required: false
    json_schema:
      type: string
      description: Optional CSS selector root for form inspection.
  - name: active_overlay
    data_type: boolean
    description: Prefer the currently visible popup, picker, or autocomplete overlay.
    required: false
    json_schema:
      type: boolean
      description: Prefer the currently visible popup, picker, or autocomplete overlay.
  - name: limit
    data_type: integer
    description: Maximum interactive refs to include.
    required: false
    json_schema:
      type: integer
      description: Maximum interactive refs to include.
  - name: timeout_ms
    data_type: integer
    description: Optional timeout in milliseconds.
    required: false
    json_schema:
      type: integer
      description: Optional timeout in milliseconds.
  tags:
  - browser
  - builtin
  - system-managed
  required_effect_ids:
  - local_tool_access
  runtime_requirement_sets:
  - - browser-profile-runtime
  context_requirements:
  - session_key
  - agent_id
  timeout_seconds: 30
  requires_confirmation: false
  mutates_state: false
  supports_parallel: true
  resource_scope: browser.target
  supported_modes:
  - inline
  supported_strategies:
  - async
  supported_environments:
  - local
  runtime_key: browser.form.inspect
  capabilities:
  - browser.profile_read
  - browser.runtime_readiness
- id: browser.form.fill
  name: Browser Form Fill
  description: Fill a visible form field or a set of snapshot refs through action trace, returning before/after evidence and
    page-effect status. If the fill opens or depends on a popup, picker, async request, or hidden state, follow with overlay/network/storage/diagnostics
    evidence before claiming the form is complete.
  provider_name: crxzipple.browser
  entrypoint: tools.browser.local:create_browser_manifest_handler
  tool_kind: function
  parameters:
  - name: profile
    data_type: string
    description: Browser profile to use. Omit this for normal browser work; the runtime/session/agent/browser default profile
      is used automatically. Only pass a concrete configured profile name when the user explicitly asks for one; 'default'
      is not a profile name.
    required: false
    json_schema:
      type: string
      description: Browser profile to use. Omit this for normal browser work; the runtime/session/agent/browser default profile
        is used automatically. Only pass a concrete configured profile name when the user explicitly asks for one; 'default'
        is not a profile name.
  - name: profile_pool
    data_type: string
    description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
    required: false
    json_schema:
      type: string
      description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
  - name: target_id
    data_type: string
    description: Optional live browser tab identifier.
    required: false
    json_schema:
      type: string
      description: Optional live browser tab identifier.
  - name: selector
    data_type: string
    description: CSS selector for the field to fill.
    required: false
    json_schema:
      type: string
      description: CSS selector for the field to fill.
  - name: ref
    data_type: string
    description: Snapshot ref for the field to fill.
    required: false
    json_schema:
      type: string
      description: Snapshot ref for the field to fill.
  - name: text
    data_type: string
    description: Text value to write into the field.
    required: false
    json_schema:
      type: string
      description: Text value to write into the field.
  - name: fields
    data_type: array
    description: Optional batch of field refs and values from browser.form.inspect.
    required: false
    json_schema:
      type: array
      description: Optional batch of field refs and values from browser.form.inspect.
      items:
        type: object
        additionalProperties: true
  - name: input_mode
    data_type: string
    description: 'Input strategy for editable text controls: fill or type.'
    required: false
    json_schema:
      type: string
      description: 'Input strategy for editable text controls: fill or type.'
  - name: clear_existing
    data_type: boolean
    description: Clear existing text before writing when supported.
    required: false
