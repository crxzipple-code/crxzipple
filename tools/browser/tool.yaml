kind: local_package
namespace: browser
capabilities:
- browser.profile_read
- browser.control
- browser.page_action
- browser.code_read
- browser.network_read
- browser.network_sensitive_read
- browser.environment_control
- browser.diagnostics_read
- browser.context_control
- browser.artifact_write
- browser.runtime_readiness
- artifact.read
- artifact.write
- runtime_settings.read
prompt:
  title: Browser Automation
  summary: Use the Browser for verifiable browser evidence, not just a DOM snapshot tool. For data-heavy websites, navigate
    or observe once to get bearings, then use runtime/code and network evidence to locate the site's data path before state-changing
    page actions. Avoid repeated tab inventory once a target is known. Expand form, overlay/date-picker, DOM, storage, diagnostics,
    tabs, or trace groups only when the evidence path requires them.
  evidence_path_ladder:
  - key: orient
    title: Orient In Browser State
    summary: Start with the live page, tabs, console, visible controls, and runtime hints. Treat the first observation as
      a map, not proof that hidden or script-driven behavior is absent.
    tool_ids:
    - browser.observe
    - browser.tabs.list
  - key: runtime_and_code
    title: Inspect Runtime And Frontend Code
    summary: When a site is script-driven, inspect live runtime objects, resource trees, scripts, and request-building code
      before repeating fragile form clicks.
    tool_ids:
    - browser.runtime.inspect
    - browser.script.find_request
    - browser.code.search
    - browser.script.extract_request
    - browser.runtime.probe_client
    - browser.runtime.call_client
    - browser.script.inspect
  - key: network_truth
    title: Trace Network Truth
    summary: Use captured requests, page-context fetches, response bodies, and replayable requests to verify data returned
      by the site.
    tool_ids:
    - browser.network.inspect
    - browser.network.fetch_as_page
    - browser.network.replay_request
  - key: stateful_interaction
    title: Act With Evidence
    summary: When page interaction is needed, perform one state-changing action at a time and verify the before/after state,
      network, storage, or lifecycle delta.
    tool_ids:
    - browser.action.trace
    - browser.form.inspect
    - browser.overlay.observe
    - browser.dom.clickability
  - key: diagnose_blockers
    title: Diagnose Blockers
    summary: Use storage, service worker, page errors, performance metrics, and traces to explain auth/session/runtime failures.
    tool_ids:
    - browser.storage.indexeddb.list
    - browser.service_worker.inspect
    - browser.page.errors
    - browser.performance.metrics
  groups:
    navigation:
      order: 10
      title: Navigation & Tabs
      summary: Open pages and recover/switch/close tabs. Start with browser.navigate when a URL is known; browser.tabs.list
        is for recovery or multi-tab ambiguity, not a repeated pre-flight check.
      function_ids:
      - browser.navigate
      - browser.tabs.list
      - browser.tabs.select
      - browser.tabs.close
      default_tool_schema_ids:
      - browser.navigate
      default_tool_schema_max_count: 1
      default_tool_schema_source: bundled.local_package.browser.prompt_group.navigation
    observation:
      order: 15
      title: Browser Observation
      summary: Use as the first pass. The DOM/interactive snapshot is a route map, not an absence proof; if forms, overlays,
        date/calendar pickers, script-driven controls, requests, or state are missing or ambiguous, follow with the specialized
        form/overlay/DOM/script/network/storage/diagnostics tools.
      function_ids:
      - browser.observe
      default_tool_schema_ids:
      - browser.observe
      default_tool_schema_max_count: 1
      default_tool_schema_source: bundled.local_package.browser.prompt_group.observation
    action_trace:
      order: 35
      title: Action Trace
      summary: 'Run one click/type/fill/evaluate action with before/after snapshots, console/page-error/network/storage/lifecycle
        deltas, and follow-up tools; use the returned evidence to verify the effect before claiming success. Keep this group
        on demand: use it after runtime/code or network evidence has identified a concrete state change to test.'
      function_ids:
      - browser.action.trace
      default_tool_schema_ids:
      - browser.action.trace
      default_tool_schema_max_count: 1
      default_tool_schema_source: bundled.local_package.browser.prompt_group.action_trace
    native_script:
      order: 37
      title: Native Browser Script
      summary: Run a bounded, Playwright-like sequence on the managed browser target as one transaction. Use this when a site-specific
        form flow needs deterministic waits, autocomplete selection, URL assertions, screenshots, or extraction without splitting
        every step across separate LLM turns.
      function_ids:
      - browser.native.run
      default_tool_schema_ids:
      - browser.native.run
      default_tool_schema_max_count: 1
      default_tool_schema_source: bundled.local_package.browser.prompt_group.native_script
    page_interaction:
      order: 50
      title: Page Interaction
      summary: Use lower-level snapshots, clicks, typing, and screenshots after observation or trace has identified a target.
        Treat snapshots as entrypoints; if dynamic UI is missing, inspect forms/overlays, DOM layout, scripts, network, storage,
        or diagnostics instead of concluding absence.
      function_ids:
      - browser.snapshot
      - browser.click
      - browser.type
      - browser.screenshot
      default_tool_schema_ids:
      - browser.snapshot
      - browser.click
      - browser.type
      default_tool_schema_max_count: 4
      default_tool_schema_source: bundled.local_package.browser.prompt_group.page_interaction
    forms_overlays:
      order: 40
      title: Forms & Overlays
      summary: Inspect and operate visible form fields, action controls, autocomplete menus, dialogs, and date/calendar pickers
        when the primary snapshot cannot expose enough structure.
      function_ids:
      - browser.form.inspect
      - browser.form.fill
      - browser.overlay.observe
      - browser.overlay.select
      default_tool_schema_ids:
      - browser.form.inspect
      - browser.overlay.observe
      - browser.form.fill
      - browser.overlay.select
      default_tool_schema_max_count: 4
      default_tool_schema_source: bundled.local_package.browser.prompt_group.forms_overlays
    dom_inspection:
      order: 45
      title: DOM Inspection
      summary: Inspect element layout, styles, clickability, highlights, and DOM mutations to verify real page state or blockers
        when snapshot refs are incomplete.
      function_ids:
      - browser.dom.inspect
      - browser.dom.box_model
      - browser.dom.computed_style
      - browser.dom.clickability
      - browser.dom.highlight
      - browser.dom.mutation_wait
      default_tool_schema_ids:
      - browser.dom.inspect
      - browser.dom.clickability
      - browser.dom.mutation_wait
      default_tool_schema_max_count: 3
      default_tool_schema_source: bundled.local_package.browser.prompt_group.dom_inspection
    network:
      order: 25
      title: Network Capture & Replay
      summary: 'Capture and inspect requests, response/request bodies, page-context fetches, and replay when UI behavior or
        data must be verified beyond DOM text. For data-heavy sites, pair this with Code & Runtime Insight before filling
        forms: start a capture, trigger a runtime client method or one focused page action, list filtered requests, then read
        body or replay the selected request.'
      function_ids:
      - browser.network.inspect
      - browser.network.start_capture
      - browser.network.stop_capture
      - browser.network.list_requests
      - browser.network.get_request
      - browser.network.get_response_body
      - browser.network.get_request_body
      - browser.network.fetch_as_page
      - browser.network.replay_request
      - browser.network.clear_capture
      default_tool_schema_ids:
      - browser.network.inspect
      - browser.network.start_capture
      - browser.network.list_requests
      - browser.network.get_response_body
      - browser.network.fetch_as_page
      - browser.network.replay_request
      default_tool_schema_max_count: 6
      default_tool_schema_source: bundled.local_package.browser.prompt_group.network
    code_insight:
      order: 20
      title: Code & Runtime Insight
      summary: 'Analyze runtime state and live frontend scripts through DevTools to understand app state, handlers, endpoints,
        and request construction with bounded script evidence. Treat script/code search as an index: after a candidate appears,
        inspect, evaluate, capture, fetch, or replay it instead of widening keyword searches. After runtime.probe_client finds
        a callable frontend data method, prefer browser.runtime.call_client over hand-written evaluate; use browser.evaluate
        only for deliberate custom page-context summaries. For data-heavy sites such as airline, booking, shopping, or dashboard
        pages, prefer this group immediately after the first observe before filling visible forms.'
      function_ids:
      - browser.runtime.inspect
      - browser.script.list
      - browser.script.find_request
      - browser.code.search
      - browser.script.extract_request
      - browser.runtime.probe_client
      - browser.runtime.call_client
      - browser.script.inspect
      - browser.evaluate
      default_tool_schema_ids:
      - browser.runtime.inspect
      - browser.script.find_request
      - browser.code.search
      - browser.script.extract_request
      - browser.runtime.probe_client
      - browser.runtime.call_client
      - browser.script.inspect
      - browser.evaluate
      default_tool_schema_max_count: 8
      default_tool_schema_source: bundled.local_package.browser.prompt_group.code_insight
    storage:
      order: 55
      title: Storage & Workers
      summary: Inspect IndexedDB, CacheStorage, service workers, and client state when important data or authentication/session
        behavior is not visible in DOM or network summaries.
      function_ids:
      - browser.storage.indexeddb.list
      - browser.storage.indexeddb.query
      - browser.storage.indexeddb.get
      - browser.storage.cache.list
      - browser.storage.cache.get
      - browser.service_worker.list
      - browser.service_worker.inspect
      default_tool_schema_ids:
      - browser.storage.indexeddb.list
      - browser.storage.cache.list
      - browser.service_worker.list
      default_tool_schema_max_count: 3
      default_tool_schema_source: bundled.local_package.browser.prompt_group.storage
    context_leases:
      order: 60
      title: Context Leases
      summary: Acquire, read, heartbeat, release, and reconcile browser context leases.
      function_ids:
      - browser.context.acquire
      - browser.context.current
      - browser.context.heartbeat
      - browser.context.release
      - browser.context.reconcile
      default_tool_schema_ids:
      - browser.context.acquire
      - browser.context.current
      - browser.context.reconcile
      default_tool_schema_max_count: 3
      default_tool_schema_source: bundled.local_package.browser.prompt_group.context_leases
    environment:
      order: 70
      title: Environment Controls
      summary: Set emulation, permissions, geolocation, and network conditions.
      function_ids:
      - browser.emulation.set
      - browser.emulation.reset
      - browser.permissions.grant
      - browser.permissions.clear
      - browser.geolocation.set
      - browser.network_conditions.set
      default_tool_schema_ids:
      - browser.emulation.set
      - browser.emulation.reset
      - browser.network_conditions.set
      default_tool_schema_max_count: 3
      default_tool_schema_source: bundled.local_package.browser.prompt_group.environment
    diagnostics:
      order: 80
      title: Diagnostics & Tracing
      summary: Collect diagnostics, performance metrics, traces, lifecycle facts, and page errors to explain failures and
        corroborate conclusions with observable evidence.
      function_ids:
      - browser.diagnostics.collect
      - browser.performance.metrics
      - browser.trace.start
      - browser.trace.stop
      - browser.trace.export
      - browser.page.lifecycle
      - browser.page.errors
      default_tool_schema_ids:
      - browser.diagnostics.collect
      - browser.page.errors
      - browser.performance.metrics
      default_tool_schema_max_count: 3
      default_tool_schema_source: bundled.local_package.browser.prompt_group.diagnostics
  default_tool_schema_policy:
    priority: 20
  default_tool_schema_group_refs:
  - source_id: bundled.local_package.browser
    group_key: navigation
    reason: browser_starter_navigation
    priority: 10
  - source_id: bundled.local_package.browser
    group_key: observation
    reason: browser_starter_observation
    priority: 20
  - source_id: bundled.local_package.browser
    group_key: code_insight
    reason: browser_engineering_investigation
    priority: 30
  - source_id: bundled.local_package.browser
    group_key: network
    reason: browser_network_truth
    priority: 40
dependencies:
- id: browser-profile-runtime
  kind: external_requirement
  description: Requires a daemon-managed Browser runtime.
- id: browser_tool_application
  kind: service_dependency
  required: false
  description: Browser application service for control, page actions, network, runtime, and storage operations.
- id: browser_system_config_store
  kind: service_dependency
  required: false
  description: Browser system configuration store used for profile defaults.
- id: browser_profile_resolver
  kind: service_dependency
  required: false
  description: Resolves Browser profile context from input, session, agent, and runtime defaults.
- id: browser_capabilities_resolver
  kind: service_dependency
  required: false
  description: Resolves Browser capability limits for the active profile/context.
- id: browser_observation_service
  kind: service_dependency
  required: false
  description: Browser observation service for combined page, runtime, script, network, and evidence inspection.
- id: artifact_service
  kind: optional_dependency
  required: false
  description: Artifact service for screenshots, traces, and large browser evidence.
- id: settings
  kind: optional_dependency
  required: false
  description: Effective runtime settings used by Browser tools.
- id: browser_runtime_state_store
  kind: service_dependency
  required: false
  description: Browser runtime state store for active target/profile facts.
- id: browser_profile_probe_service
  kind: service_dependency
  required: false
  description: Browser profile probe service for runtime readiness diagnostics.
- id: browser_profile_allocator_service
  kind: service_dependency
  required: false
  description: Browser profile allocator service for pool-backed context leases.
local_tools:
- id: browser.observe
  name: Browser Observe
  description: Primary browser task entrypoint. Observe the current page with tabs, interaction refs, forms/overlays, console,
    runtime, network, scripts, code hints, and suggested next tools. The snapshot is only a first pass; when controls, data,
    or effects are missing or ambiguous, continue with form/overlay/DOM/script/network/storage/diagnostics tools before concluding.
  provider_name: crxzipple.browser
  entrypoint: tools.browser.local:create_browser_manifest_handler
  tool_kind: function
  parameters:
  - name: profile
    data_type: string
    description: Browser profile to use. Omit this for normal browser work; the runtime/session/agent/browser default profile
      is used automatically. Only pass a concrete configured profile name when the user explicitly asks for one; 'default'
      is not a profile name.
    required: false
    json_schema:
      type: string
      description: Browser profile to use. Omit this for normal browser work; the runtime/session/agent/browser default profile
        is used automatically. Only pass a concrete configured profile name when the user explicitly asks for one; 'default'
        is not a profile name.
  - name: profile_pool
    data_type: string
    description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
    required: false
    json_schema:
      type: string
      description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
  - name: target_id
    data_type: string
    description: Optional live browser tab identifier.
    required: false
    json_schema:
      type: string
      description: Optional live browser tab identifier.
  - name: format
    data_type: string
    description: Snapshot format for the primary page observation. Defaults to interactive.
    required: false
    json_schema:
      type: string
      description: Snapshot format for the primary page observation. Defaults to interactive.
  - name: mode
    data_type: string
    description: Interactive observation mode such as efficient or wide.
    required: false
    json_schema:
      type: string
      description: Interactive observation mode such as efficient or wide.
  - name: active_overlay
    data_type: boolean
    description: Prefer the currently visible popup, picker, or autocomplete overlay.
    required: false
    json_schema:
      type: boolean
      description: Prefer the currently visible popup, picker, or autocomplete overlay.
  - name: limit
    data_type: integer
    description: Maximum interactive refs to include.
    required: false
    json_schema:
      type: integer
      description: Maximum interactive refs to include.
  - name: include_tabs
    data_type: boolean
    description: Include browser tab summary. Defaults to true.
    required: false
    json_schema:
      type: boolean
      description: Include browser tab summary. Defaults to true.
  - name: include_console
    data_type: boolean
    description: Include recent console messages. Defaults to true.
    required: false
    json_schema:
      type: boolean
      description: Include recent console messages. Defaults to true.
  - name: include_page_errors
    data_type: boolean
    description: Include page error diagnostics. Defaults to false.
    required: false
    json_schema:
      type: boolean
      description: Include page error diagnostics. Defaults to false.
  - name: include_runtime
    data_type: boolean
    description: Include resource tree and performance summary. Defaults to true.
    required: false
    json_schema:
      type: boolean
      description: Include resource tree and performance summary. Defaults to true.
  - name: include_resource_tree
    data_type: boolean
    description: Include CDP resource tree summary when runtime is enabled. Defaults to true.
    required: false
    json_schema:
      type: boolean
      description: Include CDP resource tree summary when runtime is enabled. Defaults to true.
  - name: include_performance_metrics
    data_type: boolean
    description: Include browser performance metric summary when runtime is enabled. Defaults to true.
    required: false
    json_schema:
      type: boolean
      description: Include browser performance metric summary when runtime is enabled. Defaults to true.
  - name: include_network_capture
    data_type: boolean
    description: Include requests from an existing browser network capture. Defaults to false.
    required: false
    json_schema:
      type: boolean
      description: Include requests from an existing browser network capture. Defaults to false.
  - name: include_scripts
    data_type: boolean
    description: Include bounded live script metadata. Defaults to true.
    required: false
    json_schema:
      type: boolean
      description: Include bounded live script metadata. Defaults to true.
  - name: script_limit
    data_type: integer
    description: Maximum live scripts to include in the observation.
    required: false
    json_schema:
      type: integer
      description: Maximum live scripts to include in the observation.
  - name: script_url_contains
    data_type: string
    description: Optional URL fragment used to filter observed scripts.
    required: false
    json_schema:
      type: string
      description: Optional URL fragment used to filter observed scripts.
  - name: code_search_query
    data_type: string
    description: Optional bounded code search query for live scripts.
    required: false
    json_schema:
      type: string
      description: Optional bounded code search query for live scripts.
  - name: code_search_limit
    data_type: integer
    description: Maximum code search matches to include.
    required: false
    json_schema:
      type: integer
      description: Maximum code search matches to include.
  - name: script_request_url
    data_type: string
    description: Optional request URL to locate in live scripts.
    required: false
    json_schema:
      type: string
      description: Optional request URL to locate in live scripts.
  - name: script_request_query
    data_type: string
    description: Optional endpoint, path, or keyword to locate in live scripts.
    required: false
    json_schema:
      type: string
      description: Optional endpoint, path, or keyword to locate in live scripts.
  - name: capture_id
    data_type: string
    description: Existing browser network capture id to summarize when include_network_capture is true.
    required: false
    json_schema:
      type: string
      description: Existing browser network capture id to summarize when include_network_capture is true.
  - name: runtime_limit
    data_type: integer
    description: Maximum performance/resource entries to inspect for runtime summary.
    required: false
    json_schema:
      type: integer
      description: Maximum performance/resource entries to inspect for runtime summary.
  - name: network_limit
    data_type: integer
    description: Maximum captured network requests to include.
    required: false
    json_schema:
      type: integer
      description: Maximum captured network requests to include.
  - name: timeout_ms
    data_type: integer
    description: Optional timeout in milliseconds.
    required: false
    json_schema:
      type: integer
      description: Optional timeout in milliseconds.
  tags:
  - browser
  - builtin
  - system-managed
  required_effect_ids:
  - local_tool_access
  runtime_requirement_sets:
  - - browser-profile-runtime
  context_requirements:
  - session_key
  - agent_id
  timeout_seconds: 30
  requires_confirmation: false
  mutates_state: false
  supports_parallel: true
  resource_scope: browser.target
  supported_modes:
  - inline
  supported_strategies:
  - async
  supported_environments:
  - local
  runtime_key: browser.observe
  capabilities:
  - browser.profile_read
  - browser.page_action
  - browser.runtime_readiness
  - browser.code_read
- id: browser.form.inspect
  name: Browser Form Inspect
  description: Inspect visible form fields, submit/action controls, autocomplete/menu/dialog/date picker overlays, and current
    overlay candidates. Use when the primary snapshot does not expose enough structure for a reliable fill or selection.
  provider_name: crxzipple.browser
  entrypoint: tools.browser.local:create_browser_manifest_handler
  tool_kind: function
  parameters:
