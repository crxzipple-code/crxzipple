    data_type: string
    description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
    required: false
    json_schema:
      type: string
      description: Browser profile pool to allocate from. Use this for isolated multi-profile browser work.
  - name: target_id
    data_type: string
    description: Optional live browser tab identifier.
    required: false
    json_schema:
      type: string
      description: Optional live browser tab identifier.
  - name: object_path
    data_type: string
    description: Page-context object path to resolve, for example $nuxt.$http.shopping.
    required: true
    json_schema:
      type: string
      description: Page-context object path to resolve, for example $nuxt.$http.shopping.
  - name: method_name
    data_type: string
    description: Optional method name under object_path to describe.
    required: false
    json_schema:
      type: string
      description: Optional method name under object_path to describe.
  - name: limit
    data_type: integer
    description: Maximum keys or methods to describe.
    required: false
