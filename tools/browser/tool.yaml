  description: Run a bounded Playwright-like action sequence on the current managed browser tab. Use it for deterministic
    site flows that need one transaction with waits and assertions, such as fill city, wait for autocomplete text, click the
    candidate, wait for URL/network, then extract text or screenshot. This is a browser-owned native action sequence, not
    arbitrary workspace command execution.
