kind: local_package
namespace: command
prompt:
  title: Command Execution
  summary: Run shell commands for tests, builds, diagnostics, and managed process sessions inside the session-bound workspace. Prefer high-signal commands, narrow verification, explicit timeouts, and bounded output.
  default_tool_schema_policy:
    priority: 10
  default_tool_schema_group_refs:
    - source_id: bundled.local_package.command
      group_key: run_and_verify
    - source_id: bundled.local_package.command
      group_key: background_processes
  groups:
    run_and_verify:
      order: 10
      title: Run And Verify
      summary: Prefer high-signal commands, narrow verification, explicit timeouts, and max_output_tokens for potentially long output. Execute focused tests, builds, linters, searches, and diagnostics from the bound workspace. Do not use long raw output as the default exploration surface.
      function_ids:
        - exec
      default_tool_schema_ids:
        - exec
      default_tool_schema_max_count: 1
      default_tool_schema_source: bundled.local_package.command.prompt_group.run_and_verify
    background_processes:
      order: 20
      title: Background Processes
      summary: Poll bounded logs, track process state, and stop or remove stale sessions when no longer needed. Manage long-running commands started for servers, watchers, or diagnostics.
      function_ids:
        - process
      default_tool_schema_ids:
        - process
      default_tool_schema_max_count: 1
      default_tool_schema_source: bundled.local_package.command.prompt_group.background_processes
capabilities:
  - workspace.lookup
  - process.spawn
  - process.manage
dependencies:
  - id: session_workspace_lookup
    kind: service_dependency
    description: Resolves session keys to their bound workspace directories.
  - id: process_service
    kind: service_dependency
    description: Process application service used for background command sessions.
local_tools:
  - id: exec
    name: Workspace Exec
    description: Run a local shell command from the current bound workspace. Prefer focused, high-signal commands and set max_output_tokens for commands that may produce long output.
    provider_name: local_system
    entrypoint: tools.command.local:exec
    tool_kind: function
    parameters:
      - name: command
        data_type: string
        description: Shell command to run from the bound workspace.
        required: true
      - name: cwd
        data_type: string
        description: Optional relative directory inside the workspace to use as the current working directory.
        required: false
      - name: timeout_seconds
        data_type: integer
        description: Optional command timeout in seconds.
        required: false
      - name: max_output_tokens
        data_type: integer
        description: Optional approximate token budget for combined stdout and stderr returned to the model.
        required: false
      - name: yield_time_ms
        data_type: integer
        description: Optional milliseconds to wait before returning a background process handle if the command is still running. Ignored when background is true.
        required: false
      - name: background
        data_type: boolean
        description: Start the command as a background process and return a process id instead of waiting for completion.
        required: false
    tags:
      - command
      - process
      - builtin
      - system-managed
      - surface:interactive
    required_effect_ids:
      - command_execution
    timeout_seconds: 20
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: exec
  - id: process
    name: Background Process
    description: Manage background commands started from the current bound workspace. Poll bounded logs and stop or remove stale sessions after verification.
    provider_name: local_system
    entrypoint: tools.command.local:process
    tool_kind: function
    parameters:
      - name: action
        data_type: string
        description: One of list, poll, log, kill, or remove.
        required: true
      - name: process_id
        data_type: string
        description: Background process identifier for poll, log, kill, or remove actions.
        required: false
      - name: stdout_offset
        data_type: integer
        description: Optional stdout offset for poll or log.
        required: false
      - name: stderr_offset
        data_type: integer
        description: Optional stderr offset for poll or log.
        required: false
      - name: limit
        data_type: integer
        description: Optional maximum number of stdout or stderr characters to return.
        required: false
    tags:
      - command
      - process
      - builtin
      - system-managed
      - surface:interactive
    required_effect_ids:
      - command_execution
    timeout_seconds: 20
    mutates_state: true
    supported_modes:
      - inline
    supported_strategies:
      - async
    supported_environments:
      - local
    runtime_key: process
