kind: openapi
namespace: itick_market
description: iTick market data APIs for stock and crypto quotes.
runtime_request:
  title: iTick Market Data
  summary: Retrieve stock, crypto, and market instrument data from iTick APIs.
capabilities:
  - bounded_network.http
  - credential.read
  - access.readiness
spec: openapi.json
timeout_seconds: 10
default_effect_ids:
  - market_data
credentials:
  TokenHeader: itick-api-token
