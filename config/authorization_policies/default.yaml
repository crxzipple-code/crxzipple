- id: allow_llm_invocation
  description: Allow invoking, streaming, and warming up configured llm profiles.
  effect: allow
  actions:
    - llm.invoke
    - llm.stream
    - llm.warmup
  resource:
    kind: llm_profile

- id: allow_artifact_read
  description: Allow reading artifact metadata, previews, originals, and downloads.
  effect: allow
  actions:
    - artifact.read
  resource:
    kind: artifact

- id: allow_safe_tool_execution
  description: Allow executing non-mutating tools through the tool subsystem.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
    match:
      mutates_state: false

- id: allow_browser_tool_execution
  description: Allow executing configured browser tools through the browser runtime source.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
    match:
      source_id: configured.browser

- id: allow_browser_local_tool_access_effect
  description: Allow configured browser tools to use the local browser runtime effect.
  effect: allow
  actions:
    - tool.effect.authorize
  resource:
    kind: tool
    match:
      source_id: configured.browser
  condition:
    eq:
      - context.requested_effect_id
      - local_tool_access

- id: allow_session_context_tool_execution
  description: Allow executing session-context tools inside a bound session run.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
  condition:
    eq:
      - resource.scope_required
      - session_context

- id: allow_session_context_tool_mutation_effect
  description: Allow the state_mutation effect for session-context tools inside a bound session run.
  effect: allow
  actions:
    - tool.effect.authorize
  resource:
    kind: tool
  condition:
    all:
      - eq:
          - resource.scope_required
          - session_context
      - eq:
          - context.requested_effect_id
          - state_mutation

- id: allow_skill_authoring_draft_tool_execution
  description: Allow governed skill draft tools to manage draft lifecycle state.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
    id: skill_draft_*

- id: allow_skill_authoring_draft_lifecycle_effects
  description: Allow low-risk skill draft lifecycle effects; applying drafts still requires approval.
  effect: allow
  actions:
    - tool.effect.authorize
  resource:
    kind: tool
    id: skill_draft_*
  condition:
    in:
      - context.requested_effect_id
      - - skill_authoring.create
        - skill_authoring.update
        - skill_authoring.validate
        - skill_authoring.diff
        - skill_authoring.reject

- id: allow_cli_source_cancel_from_cli_interface
  description: Allow local operator CLI to cancel governed CLI source processes.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
  condition:
    all:
      - eq:
          - context.interface
          - cli
      - contains:
          - resource.required_effect_ids
          - tool.cli.cancel

- id: deny_tool_access_when_required_scope_missing
  description: Hide tools when the current run context does not provide the required scope.
  effect: deny
  actions:
    - tool.authorize
    - tool.run
  resource:
    kind: tool
  condition:
    all:
      - exists: resource.scope_required
      - not:
          contains:
            - context.available_scopes
            - resource.scope_required

- id: deny_tool_access_when_surface_requires_explicit_declaration
  description: Hide tools on declared-only surfaces unless the tool explicitly declares support.
  effect: deny
  actions:
    - tool.authorize
    - tool.run
  resource:
    kind: tool
  condition:
    all:
      - eq:
          - context.surface_contract
          - declared_only
      - not:
          any:
            - exists: resource.supported_surfaces
            - exists: resource.surface_mode

- id: deny_tool_access_when_surface_mismatch
  description: Hide tools whose declared surface does not match the current run surface.
  effect: deny
  actions:
    - tool.authorize
    - tool.run
  resource:
    kind: tool
  condition:
    any:
      - all:
          - exists: resource.supported_surfaces
          - not:
              contains:
                - resource.supported_surfaces
                - context.surface
      - all:
          - not:
              exists: resource.supported_surfaces
          - exists: resource.surface_mode
          - ne:
              - resource.surface_mode
              - context.surface
