- id: allow_llm_invocation
  description: Allow invoking and streaming configured llm profiles.
  effect: allow
  actions:
    - llm.invoke
    - llm.stream
  resource:
    kind: llm_profile

- id: allow_safe_tool_execution
  description: Allow executing non-mutating tools through the tool subsystem.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
    match:
      mutates_state: false

- id: allow_session_context_tool_execution
  description: Allow executing session-context tools inside a bound session run.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
  condition:
    eq:
      - resource.scope_required
      - session_context

- id: allow_session_context_tool_mutation_effect
  description: Allow the state_mutation effect for session-context tools inside a bound session run.
  effect: allow
  actions:
    - tool.access_effect
  resource:
    kind: tool
  condition:
    all:
      - eq:
          - resource.scope_required
          - session_context
      - eq:
          - context.requested_effect_id
          - state_mutation

- id: deny_tool_access_when_required_scope_missing
  description: Hide tools when the current run context does not provide the required scope.
  effect: deny
  actions:
    - tool.access_tool
    - tool.run
  resource:
    kind: tool
  condition:
    all:
      - exists: resource.scope_required
      - not:
          contains:
            - context.available_scopes
            - resource.scope_required

- id: deny_tool_access_when_surface_requires_explicit_declaration
  description: Hide tools on declared-only surfaces unless the tool explicitly declares support.
  effect: deny
  actions:
    - tool.access_tool
    - tool.run
  resource:
    kind: tool
  condition:
    all:
      - eq:
          - context.surface_contract
          - declared_only
      - not:
          any:
            - exists: resource.supported_surfaces
            - exists: resource.surface_mode

- id: deny_tool_access_when_surface_mismatch
  description: Hide tools whose declared surface does not match the current run surface.
  effect: deny
  actions:
    - tool.access_tool
    - tool.run
  resource:
    kind: tool
  condition:
    any:
      - all:
          - exists: resource.supported_surfaces
          - not:
              contains:
                - resource.supported_surfaces
                - context.surface
      - all:
          - not:
              exists: resource.supported_surfaces
          - exists: resource.surface_mode
          - ne:
              - resource.surface_mode
              - context.surface
