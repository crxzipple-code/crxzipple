- id: allow_llm_invocation
  description: Allow invoking and streaming configured llm profiles.
  effect: allow
  actions:
    - llm.invoke
    - llm.stream
  resource:
    kind: llm_profile

- id: allow_safe_tool_execution
  description: Allow executing non-mutating tools through the tool subsystem.
  effect: allow
  actions:
    - tool.run
  resource:
    kind: tool
    match:
      mutates_state: false

- id: deny_memory_lookup_tools_in_system_flows
  description: Hide durable-memory lookup tools during non-conversational system flows.
  effect: deny
  actions:
    - tool.access_tool
    - tool.run
  resource:
    kind: tool
    id: "memory_*"
  context:
    match:
      prompt_mode:
        - heartbeat
        - compaction
        - memory_flush
